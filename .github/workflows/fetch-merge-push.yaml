name: fetch-merge-update
on:
  push:
    branches:
      - main
    paths:
      - tools/run.sh
      - .github/workflows/**
  schedule:
    - cron: 10 5 * * *
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-merge-update
  cancel-in-progress: false

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: supplypike/setup-bin@8365380a806a88e7a0f0d07059b175ca2f5418d7 # v5.0.1
        with:
          uri: https://github.com/zhanhb/cidr-merger/releases/download/v1.1.3/cidr-merger-linux-amd64
          name: cidr-merger
          version: 1.1.3
      - run: sh tools/run.sh
      - name: Commit files
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "2857309+hroost@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -u
          git diff-index --quiet HEAD || git commit -a -m "[auto] upd ips"
      - name: Push changes
        if: github.ref == 'refs/heads/main'
        run: git push origin HEAD:main
