name: fetch-merge-update
on:
  push:
    branches:
      - main
    paths:
      - tools/run.sh
      - .github/workflows/**
  schedule:
    - cron: 10 5 * * *
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: supplypike/setup-bin@8365380a806a88e7a0f0d07059b175ca2f5418d7 # v5.0.1
        with:
          uri: https://github.com/zhanhb/cidr-merger/releases/download/v1.1.3/cidr-merger-linux-amd64
          name: cidr-merger
          version: 1.1.3
      - run: ./tools/run.sh
      - name: Commit files
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "2857309+hroost@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -u
          git diff-index --quiet HEAD || git commit -a -m "[auto] upd ips"
      - name: Push changes
        if: github.ref == 'refs/heads/main'
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
